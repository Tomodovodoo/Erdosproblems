name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      expected_axiom_checks:
        description: "Expected number of #print axioms declarations to check; leave blank to count automatically."
        required: false
        default: ""

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - name: Reject unimported Lean source modules
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          root = Path("ErdosProblems1066.lean")
          imports = {
              line.split()[1]
              for line in root.read_text().splitlines()
              if line.startswith("import ErdosProblems1066.")
          }
          modules = {
              "ErdosProblems1066." + ".".join(path.with_suffix("").parts[1:])
              for path in Path("ErdosProblems1066").rglob("*.lean")
          }
          missing = sorted(modules - imports)
          if missing:
              print("Lean source modules missing from ErdosProblems1066.lean:")
              for module in missing:
                  print(module)
              sys.exit(1)
          PY
      - name: Reject trusted placeholders
        run: |
          set -euo pipefail
          scan_status=0
          rg -n -i -e '\baxiom\b' -e '\bconstant\b' -e '\bsorry\b' -e '\badmit\b' -e 'unsafe' -e 'opaque' -e 'implemented_by' -e '#check' -e '#print' -e '#eval' ErdosProblems1066 ErdosProblems1066.lean --glob '*.lean' || scan_status=$?
          if [ "$scan_status" -eq 0 ]; then
            echo "Trusted placeholder or debug command found in Lean source."
            exit 1
          fi
          if [ "$scan_status" -ne 1 ]; then
            exit "$scan_status"
          fi
      - name: Reject trust-sensitive source hooks
        run: |
          set -euo pipefail
          scan_status=0
          rg -n -i -e 'native_decide' -e 'trustCompiler' -e 'ofReduceBool' ErdosProblems1066 ErdosProblems1066.lean --glob '*.lean' || scan_status=$?
          if [ "$scan_status" -eq 0 ]; then
            echo "Trust-sensitive hook found in Lean source."
            exit 1
          fi
          if [ "$scan_status" -ne 1 ]; then
            exit "$scan_status"
          fi
